apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: finlens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: finlens-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finlens-secrets
                  key: hf-token
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: finlens
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP